name: Checagem de links

# Verifica links quebrados em páginas HTML e documentação Markdown.
# Tolera lentidão e bloqueios temporários de portais .gov.br (timeouts, 429,
# 503 e 999) aceitando esses status como não-fatais, evitando falsos positivos.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Toda segunda-feira às 06:00 UTC (03:00 BRT) — checagem semanal.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# Evita execuções concorrentes para a mesma referência.
concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Verificar links com lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Cobre páginas e documentação; ignora node_modules e .git.
          args: >-
            --no-progress
            --max-concurrency 8
            --timeout 30
            --max-retries 3
            --retry-wait-time 10
            --accept 200..=299,403,429,500,503,999
            --exclude-path node_modules
            --exclude-path .git
            "**/*.html"
            "**/*.md"
          # Falha o job apenas quando há links realmente quebrados.
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
